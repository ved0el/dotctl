version: 2
project_name: dotctl

before:
  hooks:
    - go mod tidy

builds:
  - id: dotctl
    main: ./cmd/dotctl
    binary: dotctl
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    # Target main.version (package-name target, not a module path) so renaming
    # the repo needs no change here.
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: dotctl
    formats: [binary]
    # Asset names must match what install.sh downloads: dotctl_<os>_<arch>
    name_template: "dotctl_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Keyless cosign signature over checksums.txt — signs every artifact transitively.
# install.sh verifies it when cosign is present (the sha256 check is the always-on
# gate). Requires cosign + id-token:write in the release workflow.
signs:
  - cmd: cosign
    # certificate: names the keyless cert output so goreleaser tracks and uploads
    # checksums.txt.pem. Without it, ${certificate} is empty and the cert is never
    # published — leaving the keyless signature unverifiable (install.sh needs it).
    certificate: "${artifact}.pem"
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - --yes

# `release:` is intentionally omitted — goreleaser auto-detects the GitHub
# owner/repo from the git remote, so renaming the repo needs no change here.
