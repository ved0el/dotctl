name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# Force bundled JS actions (e.g. golangci-lint-action) onto the Node 24 LTS
# runtime; clears the "Node.js 20 actions are deprecated" warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: goreleaser/goreleaser-action@v7 # v7 runs on Node 24
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
