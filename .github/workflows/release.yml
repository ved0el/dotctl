name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # cosign keyless signing (OIDC)

# Force bundled JS actions (e.g. golangci-lint-action) onto the Node 24 LTS
# runtime; clears the "Node.js 20 actions are deprecated" warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v3.9.1 — provides cosign for keyless signing
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2 (Node 24)
        with:
          version: "~> v2" # pin goreleaser to its v2 line (avoids the 'latest' lock warning)
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
