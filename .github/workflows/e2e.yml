name: E2E

# Runs the full pipeline against real machines on every push, so one CI log
# confirms everything builds, installs, links, runs hooks, and passes the
# integration suite — on both macOS (Homebrew) and Linux (apt).
#
# Tools not in default apt are marked `skip: [apt]` in the layer manifests, so
# the Linux run installs the apt-available subset and stays green.
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly health check

# Force bundled JS actions (e.g. golangci-lint-action) onto the Node 24 LTS
# runtime; clears the "Node.js 20 actions are deprecated" warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bootstrap:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTCTL_REPO: ${{ github.workspace }}
      DOTCTL_PROFILES: base,tools,develop
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - run: make build VERSION=e2e
      - name: refresh apt (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update
      - name: real init (all profiles)
        env:
          # mise hits the GitHub API to resolve/verify runtimes; authenticate to
          # avoid unauthenticated 403 rate limits when installing several languages.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./dotctl init --profiles "$DOTCTL_PROFILES" -v
      - name: integration test (all profiles)
        run: go test -tags=integration -v ./test/...
